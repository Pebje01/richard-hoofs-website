<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coaching — Dokter Richard</title>
    <meta name="description" content="Persoonlijke coaching en begeleiding door Richard Hoofs — huisarts en leefstijlcoach. Balans in lichaam, geest en ziel.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== FONTS ===== */
        @font-face {
            font-family: 'Bosten';
            src: url('fonts/Bosten.woff2') format('woff2'),
                 url('fonts/Bosten.woff') format('woff'),
                 url('fonts/Bosten.otf') format('opentype');
            font-display: swap;
        }

        /* ===== RESET ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FFFAF8;
            --bg-alt: #f7f0eb;
            --green: #63746B;
            --green-dark: #3a3d32;
            --accent: #C1774F;
            --sage: #a0a496;
            --cream: #fffcf8;
            --white: #ffffff;
            --text: #2a2d24;
            --text-body: #3a3d32;
            --text-muted: #a0a496;
            --border: rgba(136, 140, 121, 0.15);
            --border-strong: rgba(136, 140, 121, 0.3);
            --font-heading: 'Montserrat', -apple-system, sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 999px;
            --max-width: 1200px;
            --section-padding: 100px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 16px;
            background: var(--bg);
            color: var(--text-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            line-height: 1.65;
        }

        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        /* ===== SEED OF LIFE DECORATIVE BACKGROUND ===== */
        .has-seed-bg { position: relative; overflow: hidden; }
        .seed-bg { position: absolute; pointer-events: none; opacity: 0.07; z-index: 0; }
        .seed-bg circle { fill: none; stroke: #fff; stroke-width: 0.5; }
        .seed-bg-right { width: 380px; height: 380px; top: -60px; right: -80px; }
        .seed-bg-left { width: 300px; height: 300px; bottom: -50px; left: -60px; }
        .seed-bg-center { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .has-seed-bg > *:not(.seed-bg) { position: relative; z-index: 1; }

        /* ===== NAVIGATION ===== */
        .nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            padding: 14px 48px;
            background: rgba(255, 250, 248, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            display: inline-flex; align-items: center; gap: 10px;
            font-family: 'Bosten', Georgia, serif; font-size: 28px; font-weight: 400;
            color: var(--green); letter-spacing: 0.02em; text-transform: uppercase;
            position: absolute; left: 48px;
        }
        .nav-logo .seed-of-life { width: 32px; height: 32px; flex-shrink: 0; }
        .nav-logo .seed-of-life circle { fill: none; stroke: var(--green); stroke-width: 0.8; }
        .nav-center {
            display: flex; align-items: center; gap: 2px;
            background: var(--bg-alt); border-radius: var(--radius-full); padding: 4px;
        }
        .nav-center a {
            font-family: var(--font-body); font-size: 13px; font-weight: 500;
            color: var(--text-muted); padding: 8px 18px; border-radius: var(--radius-full); transition: all 0.2s;
        }
        .nav-center a:hover { color: var(--green-dark); }
        .nav-center a.active {
            background: var(--white); color: var(--green-dark);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); font-weight: 600;
        }
        .nav-cta {
            position: absolute; right: 48px;
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 12px 9px 18px; background: var(--accent); color: #fff;
            border-radius: var(--radius-md); font-family: var(--font-body);
            font-size: 13px; font-weight: 600; transition: all 0.25s; overflow: hidden;
        }
        .nav-cta:hover { background: var(--green-dark); }
        .nav-cta .btn-arrow {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s; flex-shrink: 0;
        }
        .nav-cta:hover .btn-arrow { transform: translateX(3px); background: rgba(255,255,255,0.3); }
        .nav-cta .btn-arrow svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
        .hamburger svg { width: 26px; height: 26px; stroke: var(--green-dark); stroke-width: 2; fill: none; }

        /* ===== PAGE HERO ===== */
        .page-hero {
            padding: 80px 48px 60px;
            text-align: center;
            max-width: calc(var(--max-width) + 96px);
            margin: 0 auto;
        }
        .page-hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(34px, 3.8vw, 52px);
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.1;
            letter-spacing: -0.025em;
            margin-bottom: 16px;
        }
        .page-hero p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 560px;
            margin: 0 auto;
        }

        /* ===== LABEL ===== */
        .label {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: var(--font-body); font-size: 11px; font-weight: 600;
            color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px;
        }
        .label-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 13px 22px; border-radius: var(--radius-md);
            font-family: var(--font-body); font-size: 13px; font-weight: 600;
            border: none; cursor: pointer; text-decoration: none; white-space: nowrap;
            position: relative; overflow: hidden; transition: color 0.3s, border-color 0.3s; z-index: 1;
        }
        .btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scaleX(1); transform-origin: right;
        }
        .btn::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scaleX(0); transform-origin: left;
        }
        .btn:hover::before { transform: scaleX(0); transform-origin: left; }
        .btn:hover::after { transform: scaleX(1); transform-origin: right; }
        .btn .btn-arrow {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s; flex-shrink: 0;
        }
        .btn:hover .btn-arrow { transform: translateX(3px); background: rgba(255,255,255,0.3); }
        .btn .btn-arrow svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .btn-accent { background: transparent; color: #fff; }
        .btn-accent::before { background: var(--accent); }
        .btn-accent::after { background: var(--green-dark); }

        .btn-dark { background: transparent; color: #fff; }
        .btn-dark::before { background: var(--green-dark); }
        .btn-dark::after { background: var(--accent); }

        .btn-white { background: transparent; color: var(--green-dark); }
        .btn-white::before { background: #fff; }
        .btn-white::after { background: var(--bg-alt); }

        .btn-outline { background: transparent; color: var(--green-dark); border: 1.5px solid var(--border-strong); }
        .btn-outline::before { background: transparent; }
        .btn-outline::after { background: var(--accent); }
        .btn-outline:hover { color: #fff; border-color: var(--accent); }

        .btn-outline-white { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.25); }
        .btn-outline-white::before { background: transparent; }
        .btn-outline-white::after { background: rgba(255,255,255,0.12); }
        .btn-outline-white:hover { border-color: #fff; }

        .btn-ghost { background: none; color: var(--accent); padding: 12px 0; font-weight: 600; font-size: 13px; overflow: visible; }
        .btn-ghost::before, .btn-ghost::after { display: none; }
        .btn-ghost:hover { color: var(--green-dark); }
        .btn-ghost .btn-arrow { background: rgba(193,119,79,0.1); }
        .btn-ghost:hover .btn-arrow { background: rgba(58,61,50,0.1); }

        /* ===== JOURNEY ===== */
        .journey-section {
            padding: var(--section-padding) 48px;
            max-width: calc(var(--max-width) + 96px);
            margin: 0 auto;
        }
        .journey-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 56px; align-items: center; }
        .journey-image { border-radius: var(--radius-lg); overflow: hidden; }
        .journey-image img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
        .journey-content h2 {
            font-family: var(--font-heading); font-size: clamp(26px, 3vw, 36px); font-weight: 700;
            color: var(--green-dark); line-height: 1.15; letter-spacing: -0.025em; margin-bottom: 16px;
        }
        .journey-content > p { font-size: 15px; color: var(--text-body); line-height: 1.75; margin-bottom: 28px; }
        .journey-features { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
        .journey-feature { display: flex; align-items: flex-start; gap: 14px; }
        .journey-feature-icon {
            width: 40px; height: 40px; border-radius: var(--radius-sm);
            background: rgba(193, 119, 79, 0.1);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .journey-feature-icon svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
        .journey-feature h4 { font-family: var(--font-heading); font-size: 14px; font-weight: 700; color: var(--green-dark); margin-bottom: 2px; }
        .journey-feature p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        /* ===== FOUR PILLARS ===== */
        .pillars-section { padding: var(--section-padding) 48px; background: var(--bg-alt); }
        .pillars-container { max-width: var(--max-width); margin: 0 auto; }
        .pillars-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .pillars-header h2 {
            font-family: var(--font-heading); font-size: clamp(26px, 3vw, 36px); font-weight: 700;
            color: var(--green-dark); line-height: 1.15; letter-spacing: -0.025em;
        }
        .pillars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .pillar-card { position: relative; border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 3/4; }
        .pillar-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
        .pillar-card:hover img { transform: scale(1.04); }
        .pillar-card-info {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
            background: linear-gradient(to top, rgba(42, 45, 36, 0.75), transparent 80%);
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .pillar-card-info h3 { font-family: var(--font-heading); font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
        .pillar-card-info span { font-size: 11px; color: rgba(255,255,255,0.65); }
        .pillar-arrow {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s;
        }
        .pillar-arrow:hover { background: rgba(255,255,255,0.3); }
        .pillar-arrow svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ===== PRICING ===== */
        .pricing-section { padding: var(--section-padding) 48px; background: var(--bg-alt); }
        .pricing-container { max-width: var(--max-width); margin: 0 auto; }
        .pricing-header { text-align: center; margin-bottom: 48px; }
        .pricing-header h2 {
            font-family: var(--font-heading); font-size: clamp(26px, 3vw, 38px); font-weight: 700;
            color: var(--green-dark); line-height: 1.15; letter-spacing: -0.025em; margin-bottom: 10px;
        }
        .pricing-header p { font-size: 15px; color: var(--text-muted); }
        .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .pricing-card {
            background: var(--cream); border-radius: var(--radius-lg); padding: 36px 28px;
            border: 1px solid var(--border); transition: all 0.25s; position: relative;
            display: flex; flex-direction: column;
        }
        .pricing-card:hover { box-shadow: 0 12px 40px rgba(58, 61, 50, 0.08); transform: translateY(-3px); }
        .pricing-card.featured { background: var(--green); border-color: var(--green); }
        .pricing-card.featured h3, .pricing-card.featured .pricing-price, .pricing-card.featured .pricing-features li { color: #fff; }
        .pricing-card.featured .pricing-desc, .pricing-card.featured .pricing-duration { color: rgba(255,255,255,0.55); }
        .pricing-card.featured .pricing-features li svg { stroke: rgba(255,255,255,0.65); }
        .pricing-card.featured .pricing-duration { border-bottom-color: rgba(255,255,255,0.1); }
        .pricing-popular {
            position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
            padding: 4px 14px; background: var(--accent); color: #fff;
            border-radius: var(--radius-sm); font-family: var(--font-body);
            font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .pricing-card h3 { font-family: var(--font-heading); font-size: 18px; font-weight: 700; color: var(--green-dark); margin-bottom: 6px; letter-spacing: -0.01em; }
        .pricing-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
        .pricing-price { font-family: var(--font-heading); font-size: 30px; font-weight: 800; color: var(--green-dark); margin-bottom: 4px; letter-spacing: -0.03em; }
        .pricing-price span { font-size: 14px; font-weight: 500; color: var(--text-muted); }
        .pricing-duration { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; flex: 1; }
        .pricing-features li { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-body); }
        .pricing-features li svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 2.5; flex-shrink: 0; }
        .pricing-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px 24px; border-radius: var(--radius-md);
            font-family: var(--font-body); font-size: 13px; font-weight: 600;
            position: relative; overflow: hidden; transition: color 0.3s, border-color 0.3s; z-index: 1;
        }
        .pricing-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); transform: scaleX(1); transform-origin: right;
        }
        .pricing-btn::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); transform: scaleX(0); transform-origin: left;
        }
        .pricing-btn:hover::before { transform: scaleX(0); transform-origin: left; }
        .pricing-btn:hover::after { transform: scaleX(1); transform-origin: right; }
        .pricing-btn .btn-arrow {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0;
        }
        .pricing-btn:hover .btn-arrow { transform: translateX(3px); }
        .pricing-btn .btn-arrow svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .pricing-btn-outline { border: 1.5px solid var(--border-strong); color: var(--green-dark); background: transparent; }
        .pricing-btn-outline::before { background: transparent; }
        .pricing-btn-outline::after { background: var(--accent); }
        .pricing-btn-outline:hover { border-color: var(--accent); color: #fff; }
        .pricing-btn-white { border: 1.5px solid rgba(255,255,255,0.2); background: transparent; color: var(--green-dark); }
        .pricing-btn-white::before { background: #fff; }
        .pricing-btn-white::after { background: var(--accent); }
        .pricing-btn-white:hover { color: #fff; }

        /* ===== CTA ===== */
        .cta-section { padding: 0 48px var(--section-padding); background: var(--bg-alt); }
        .cta-inner {
            max-width: var(--max-width); margin: 0 auto;
            background: var(--green); border-radius: var(--radius-lg); padding: 56px 48px;
            display: flex; justify-content: space-between; align-items: center; gap: 40px;
            position: relative; overflow: hidden;
        }
        .cta-inner::before {
            content: ''; position: absolute; top: -60px; right: -40px;
            width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.05);
        }
        .cta-content { position: relative; z-index: 1; }
        .cta-content h2 {
            font-family: var(--font-heading); font-size: clamp(22px, 2.5vw, 32px); font-weight: 700;
            color: #fff; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 10px;
        }
        .cta-content p { font-size: 14px; color: rgba(255,255,255,0.6); max-width: 420px; line-height: 1.65; }
        .cta-buttons { position: relative; z-index: 1; display: flex; gap: 12px; flex-shrink: 0; }

        /* ===== UNIFIED FOOTER ===== */
        .unified-footer { background: var(--green); padding: 72px 48px 24px; position: relative; overflow: hidden; }
        .footer-newsletter {
            max-width: var(--max-width); margin: 0 auto 56px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
            padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .footer-newsletter-text h2 {
            font-family: var(--font-heading); font-size: clamp(24px, 2.5vw, 32px); font-weight: 700;
            color: #fff; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 8px;
        }
        .footer-newsletter-text p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.65; }
        .newsletter-form { display: flex; gap: 8px; }
        .newsletter-form input {
            flex: 1; padding: 12px 16px; border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-sm); background: rgba(255,255,255,0.08);
            color: #fff; font-size: 13px; font-family: var(--font-body); outline: none;
        }
        .newsletter-form input::placeholder { color: rgba(255,255,255,0.35); }
        .newsletter-form input:focus { border-color: rgba(255,255,255,0.4); }
        .newsletter-form button {
            padding: 12px 24px; background: #fff; color: var(--green-dark); border: none;
            border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
            font-family: var(--font-body); cursor: pointer; transition: all 0.2s;
        }
        .newsletter-form button:hover { background: var(--bg); }
        .footer-grid {
            max-width: var(--max-width); margin: 0 auto;
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 40px;
        }
        .footer-brand .footer-logo {
            font-family: 'Bosten', Georgia, serif; font-size: 20px; font-weight: 400;
            color: #fff; margin-bottom: 12px; text-transform: uppercase;
        }
        .footer-brand p { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.65; max-width: 260px; }
        .footer-social { display: flex; gap: 8px; margin-top: 16px; }
        .footer-social a {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.06); display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .footer-social a:hover { background: var(--accent); }
        .footer-social a svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.5); transition: fill 0.2s; }
        .footer-social a:hover svg { fill: #fff; }
        .footer-col h4 {
            font-family: var(--font-body); font-size: 11px; font-weight: 700;
            color: rgba(255,255,255,0.35); margin-bottom: 14px; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .footer-col a { font-size: 13px; color: rgba(255,255,255,0.55); transition: color 0.2s; }
        .footer-col a:hover { color: #fff; }
        .footer-col span { font-size: 13px; color: rgba(255,255,255,0.35); }
        .footer-bottom {
            max-width: var(--max-width); margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06);
        }
        .footer-bottom p { font-size: 12px; color: rgba(255,255,255,0.3); }
        .footer-seed-watermark { position: absolute; right: -80px; bottom: -80px; width: 500px; height: 500px; fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 0.3; pointer-events: none; }
        .footer-bottom a { color: rgba(255,255,255,0.5); text-decoration: underline; }
        .footer-bottom a:hover { color: #fff; }

        /* ===== ANIMATIONS ===== */
        .fade-in { opacity: 0; transform: translateY(14px); transition: opacity 0.35s ease, transform 0.35s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .fade-in-d1 { transition-delay: 0.06s; }
        .fade-in-d2 { transition-delay: 0.12s; }
        .fade-in-d3 { transition-delay: 0.18s; }

        /* ===== MOBILE NAV ===== */
        .mobile-nav {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg); z-index: 200; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        .mobile-nav.open { display: flex; }
        .mobile-nav a { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--green-dark); letter-spacing: -0.02em; }
        .mobile-nav a:hover { color: var(--accent); }
        .mobile-nav-close { position: absolute; top: 16px; right: 20px; background: none; border: none; cursor: pointer; }
        .mobile-nav-close svg { width: 28px; height: 28px; stroke: var(--green-dark); stroke-width: 2; fill: none; }
        .mobile-nav-cta {
            margin-top: 12px; padding: 12px 28px; background: var(--accent); color: #fff;
            border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .nav { padding: 12px 32px; }
            .nav-center { display: none; }
            .nav-cta { display: none; }
            .nav-logo { position: static; }
            .hamburger { display: block; position: absolute; right: 32px; }

            .page-hero { padding: 60px 32px 40px; }
            .journey-section { padding: 80px 32px; }
            .journey-grid { grid-template-columns: 1fr; gap: 32px; }
            .pillars-section { padding: 80px 32px; }
            .pillars-grid { grid-template-columns: repeat(2, 1fr); }
            .pricing-section { padding: 80px 32px; }
            .pricing-grid { grid-template-columns: repeat(2, 1fr); }
            .cta-section { padding: 0 32px 80px; }
            .cta-inner { flex-direction: column; text-align: center; padding: 40px 32px; }
            .cta-content p { max-width: 100%; }
            .footer-newsletter { grid-template-columns: 1fr; gap: 24px; }
            .footer-grid { grid-template-columns: 1fr; gap: 28px; }
        }

        @media (max-width: 768px) {
            :root { --section-padding: 56px; }
            .nav { padding: 10px 20px; }
            .nav-logo { font-size: 16px; }
            .hamburger { right: 20px; }

            .page-hero { padding: 40px 20px 32px; }
            .page-hero h1 { font-size: 30px; }
            .journey-section, .pillars-section, .pricing-section, .cta-section { padding-left: 20px; padding-right: 20px; }
            .pricing-grid { grid-template-columns: 1fr; }
            .pillars-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .footer-grid { grid-template-columns: 1fr; gap: 20px; font-size: 13px; }
            .footer-bottom { flex-direction: column; gap: 6px; text-align: center; }
            .cta-inner { padding: 32px 20px; }
            .cta-buttons { flex-direction: column; width: 100%; }
            .cta-buttons a { text-align: center; justify-content: center; }
            .newsletter-form { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .page-hero h1 { font-size: 26px; }
            .pillars-grid { grid-template-columns: 1fr; }
            .pillars-header { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- CONTENT -->
<main style="min-height: 60vh;"></main>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script src="nav.js"></script>
<script>
var obs=new IntersectionObserver(function(e){e.forEach(function(en){if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.fade-in').forEach(function(el){obs.observe(el)});
</script>
<script src="footer.js"></script>
</body>
