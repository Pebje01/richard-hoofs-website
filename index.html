<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokter Richard — Versies</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #fff; color: #111; padding: 10px 24px;
            border-radius: 999px; font-size: 13px; font-weight: 600;
            opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 99999;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .version-frame {
            display: none;
            width: 100%; height: 100vh;
            border: none;
        }
        .version-frame.active { display: block; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <iframe class="version-frame active" id="frame-v1" src="v1/index.html"></iframe>
    <iframe class="version-frame" id="frame-v2"></iframe>
    <iframe class="version-frame" id="frame-v3"></iframe>

    <script>
        var currentVersion = 'v1';

        function switchVersion(v) {
            currentVersion = v;
            document.querySelectorAll('.version-frame').forEach(function(f) { f.classList.remove('active'); });
            var frame = document.getElementById('frame-' + v);
            frame.src = v + '/index.html';
            frame.classList.add('active');
        }

        function shareVersion() {
            var frame = document.getElementById('frame-' + currentVersion);
            var state = {};
            try {
                state = frame.contentWindow._tbGetState ? frame.contentWindow._tbGetState() : {};
            } catch(e) {}

            var params = ['share'];
            if (state.logo)       params.push('logo=' + encodeURIComponent(state.logo) + '&logoW=' + state.logoWeight);
            if (state.h1)         params.push('h1=' + encodeURIComponent(state.h1) + '&h1W=' + state.h1Weight);
            if (state.header)     params.push('header=' + encodeURIComponent(state.header) + '&headerW=' + state.headerWeight);
            if (state.body)       params.push('body=' + encodeURIComponent(state.body) + '&bodyW=' + state.bodyWeight);
            if (state.h1Size)     params.push('h1Size=' + state.h1Size);
            if (state.headerSize) params.push('headerSize=' + state.headerSize);
            if (state.bodySize)   params.push('bodySize=' + state.bodySize);

            var base = window.location.href.split('?')[0].replace(/\/?index\.html$/, '').replace(/\/$/, '');
            var shareUrl = base + '/' + currentVersion + '/index.html?' + params.join('&');
            navigator.clipboard.writeText(shareUrl).then(function() {
                showToast('Link gekopieerd!');
            }).catch(function() {});
            window.open(shareUrl, '_blank');
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        // Listen for messages from iframe toolbar
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            if (e.data.type === 'switchVersion') {
                switchVersion(e.data.version);
            } else if (e.data.type === 'shareVersion') {
                shareVersion();
            }
        });
    </script>
</body>
</html>
