<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consult Aanvragen  Dokter Richard</title>
    <meta name="description" content="Vraag een consult aan bij Richard Hoofs, arts & coach. Vul het formulier in en ontvang binnen 2 werkdagen een reactie.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        /* ===== HERO SPLIT ===== */
        .consult-hero {
            background: linear-gradient(180deg, #eef0ed 0%, #dfe7e0 60%, var(--bg) 100%);
            position: relative;
            overflow: hidden;
        }
        .consult-hero::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: -5%;
            right: -5%;
            height: 80px;
            background: var(--bg);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }
        .consult-hero-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 160px 48px 120px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 56px;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .consult-hero-text h1 {
            margin-bottom: 16px;
        }
        .consult-hero-text p {
            font-size: 16px;
            color: var(--text-body);
            line-height: 1.8;
            margin-bottom: 28px;
            max-width: 480px;
        }
        .scroll-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            transition: transform 0.3s ease, background 0.2s;
        }
        .scroll-arrow:hover {
            transform: translateY(4px);
            background: #d4885e;
        }
        .consult-hero-image img {
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 50px rgba(58, 61, 50, 0.12);
            aspect-ratio: 4/3;
            object-fit: cover;
        }

        /* ===== CONSULT FORM ===== */
        .consult-section {
            padding: 60px 48px var(--section-padding);
        }
        .consult-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .consult-section-title {
            text-align: center;
            margin-bottom: 8px;
        }
        .consult-section-sub {
            font-size: 15px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 40px;
        }
        .consult-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--green-dark);
            margin-bottom: 6px;
        }
        .form-group label span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .form-group textarea,
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--cream);
            font-size: 14px;
            font-family: var(--font-body);
            color: var(--text-body);
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
        }
        .form-group textarea:focus,
        .form-group input:focus,
        .form-group select:focus { border-color: var(--green); }
        .form-group textarea { min-height: 90px; }
        .form-sub { margin-top: -12px; }
        .form-sub label { font-size: 13px; font-weight: 400; color: var(--text-muted); }
        .consult-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .consult-submit:hover { background: #d4885e; }

        @media (max-width: 768px) {
            .consult-hero-inner {
                grid-template-columns: 1fr;
                padding: 120px 24px 100px;
                gap: 32px;
            }
            .consult-hero-image { order: -1; }
            .consult-hero-image img { aspect-ratio: 3/2; }
            .consult-section { padding: 40px 20px 80px; }
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- HERO -->
<section class="consult-hero">
    <div class="consult-hero-inner fade-in">
        <div class="consult-hero-text">
            <h1>Consult aanvragen</h1>
            <p>Wil je een consult of coaching traject starten? Vul onderstaand formulier in zodat ik me kan voorbereiden op ons gesprek. Je ontvangt binnen 2 werkdagen een reactie.</p>
            <a href="#formulier" class="scroll-arrow" aria-label="Naar formulier"><svg viewBox="0 0 24 24" width="32" height="32"><polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        </div>
        <div class="consult-hero-image">
            <img src="images/Richard_Hoofs-9.jpg" alt="Richard Hoofs" loading="eager">
        </div>
    </div>
</section>

<!-- CONSULT FORM -->
<section class="consult-section" id="formulier">
    <div class="consult-container">
        <h2 class="consult-section-title fade-in">Vertel iets over jezelf</h2>
        <p class="consult-section-sub fade-in">Zo kan ik me voorbereiden op ons eerste gesprek.</p>
        <form class="consult-form fade-in" action="https://api.web3forms.com/submit" method="POST">
            <!-- Web3Forms hidden fields -->
            <input type="hidden" name="access_key" value="4ba3a29f-d163-4a82-aed2-3ead1397f7e0">
            <input type="hidden" name="subject" value="Nieuw consult aanvraag via website">
            <input type="hidden" name="redirect" value="https://web3forms.com/success">

            <!-- 1. Naam -->
            <div class="form-group">
                <label for="naam">Naam <span>*</span></label>
                <input type="text" id="naam" name="naam" placeholder="Je volledige naam" required>
            </div>

            <!-- 2. E-mailadres -->
            <div class="form-group">
                <label for="email">E-mailadres <span>*</span></label>
                <input type="email" id="email" name="email" placeholder="je@voorbeeld.nl" required>
            </div>

            <!-- 3. Telefoonnummer -->
            <div class="form-group">
                <label for="telefoon">Telefoonnummer <span>(optioneel)</span></label>
                <input type="tel" id="telefoon" name="telefoon" placeholder="06 - 12345678">
            </div>

            <!-- 4. Waar loop je tegenaan -->
            <div class="form-group">
                <label for="tegenaan">Waar loop je tegenaan in je leven? <span>*</span></label>
                <textarea id="tegenaan" name="waar_loop_je_tegenaan" placeholder="Beschrijf in je eigen woorden waar je tegenaan loopt..." required></textarea>
            </div>

            <!-- 5. Medische klachten -->
            <div class="form-group">
                <label for="klachten">Heb je medische klachten? Welke? <span>*</span></label>
                <textarea id="klachten" name="medische_klachten" placeholder="Beschrijf je medische klachten..." required></textarea>
            </div>

            <!-- 5b. Word je hiervoor behandeld? -->
            <div class="form-group form-sub">
                <label for="behandeld">Word je hiervoor behandeld?</label>
                <select id="behandeld" name="wordt_behandeld">
                    <option value="" disabled selected>Selecteer...</option>
                    <option value="Ja">Ja</option>
                    <option value="Nee">Nee</option>
                </select>
            </div>
            <div class="form-group form-sub">
                <label for="behandeling_details">Zo ja, door wie en welke behandeling? <span>(optioneel)</span></label>
                <textarea id="behandeling_details" name="behandeling_details" placeholder="Beschrijf je huidige behandeling..." rows="3"></textarea>
            </div>

            <!-- 6. Medicatie -->
            <div class="form-group">
                <label for="medicatie">Gebruik je medicatie? <span>(optioneel)</span></label>
                <textarea id="medicatie" name="medicatie" placeholder="Welke medicatie gebruik je?" rows="3"></textarea>
            </div>

            <!-- 7. Oorzaak -->
            <div class="form-group">
                <label for="oorzaak">Wat denk je dat de oorzaak is? <span>(optioneel)</span></label>
                <textarea id="oorzaak" name="vermoedelijke_oorzaak" placeholder="Wat denk je zelf dat de oorzaak is van je klachten?" rows="3"></textarea>
            </div>

            <!-- 8. Hoe bij mij terecht gekomen -->
            <div class="form-group">
                <label for="vindbaar">Hoe ben je bij mij terecht gekomen?</label>
                <select id="vindbaar" name="hoe_gevonden">
                    <option value="" disabled selected>Selecteer...</option>
                    <option value="Via internet">Via internet</option>
                    <option value="Via een kennis/vriend">Via een kennis/vriend</option>
                    <option value="Via een zorgverlener">Via een zorgverlener</option>
                    <option value="Via het boek">Via het boek</option>
                    <option value="Via social media">Via social media</option>
                    <option value="Anders">Anders</option>
                </select>
            </div>

            <!-- Submit -->
            <button type="submit" class="consult-submit">Verstuur aanvraag</button>
        </form>
    </div>
</section>

<div id="footer-placeholder"></div>

<script src="nav.js"></script>
<script>
var obs=new IntersectionObserver(function(e){e.forEach(function(en){if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.fade-in').forEach(function(el){obs.observe(el)});
</script>
<script src="footer.js"></script>
</body>
</html>
