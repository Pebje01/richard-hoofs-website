<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Over Richard — Dokter Richard</title>
    <meta name="description" content="Leer meer over Richard Hoofs — huisarts, leefstijlcoach en auteur in Den Bosch. Meer dan 25 jaar ervaring in holistische geneeskunde.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        /* ===== ABOUT SECTION (BIO) ===== */
        .about-section {
            padding: var(--section-padding) 48px;
            max-width: calc(var(--max-width) + 96px);
            margin: 0 auto;
        }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }
        .about-image img {
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 50px rgba(58, 61, 50, 0.1);
        }
        .about-content h2 {
            font-family: var(--font-heading);
            font-size: clamp(26px, 3vw, 36px);
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.15;
            letter-spacing: -0.025em;
            margin-bottom: 16px;
        }
        .about-content p {
            font-size: 15px;
            color: var(--text-body);
            line-height: 1.75;
            margin-bottom: 16px;
        }
        .about-content p:last-of-type {
            margin-bottom: 28px;
        }

        /* ===== QUOTE CARD (full width) ===== */
        .quote-section {
            padding: 60px 48px;
            background: var(--green);
        }
        .quote-section-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            text-align: center;
        }
        .quote-section blockquote {
            font-size: 20px;
            color: rgba(255,255,255,0.9);
            line-height: 1.7;
            font-style: italic;
            margin-bottom: 20px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        .quote-section .quote-author-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .quote-section .quote-author-role {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        /* ===== FOUR PILLARS ===== */
        .pillars-section {
            padding: var(--section-padding) 48px;
            background: var(--bg-alt);
        }
        .pillars-container {
            max-width: var(--max-width);
            margin: 0 auto;
        }
        .pillars-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }
        .pillars-header h2 {
            font-family: var(--font-heading);
            font-size: clamp(26px, 3vw, 36px);
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.15;
            letter-spacing: -0.025em;
        }
        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .pillar-card {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 3/4;
        }
        .pillar-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }
        .pillar-card:hover img { transform: scale(1.04); }
        .pillar-card-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(42, 45, 36, 0.75), transparent 80%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .pillar-card-info h3 {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
        }
        .pillar-card-info span {
            font-size: 11px;
            color: rgba(255,255,255,0.65);
        }
        .pillar-arrow {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .pillar-arrow:hover { background: rgba(255,255,255,0.3); }
        .pillar-arrow svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ===== STATS ROW ===== */
        .stats-row {
            padding: 0 48px;
            max-width: calc(var(--max-width) + 96px);
            margin: 0 auto;
        }
        .stats-inner {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .stat-item {
            padding: 32px 24px;
            border-right: 1px solid var(--border);
        }
        .stat-item:last-child { border-right: none; }
        .stat-number {
            font-family: var(--font-heading);
            font-size: 36px;
            font-weight: 800;
            color: var(--green-dark);
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 6px;
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .about-section { padding: 80px 32px; }
            .about-grid { grid-template-columns: 1fr; }
            .stats-row { padding: 0 32px; }
            .stats-inner { grid-template-columns: repeat(2, 1fr); }
            .stat-item:nth-child(2) { border-right: none; }
            .pillars-section { padding: 80px 32px; }
            .pillars-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .about-section { padding-left: 20px; padding-right: 20px; }
            .pillars-section { padding-left: 20px; padding-right: 20px; }
            .stats-row { padding: 0 20px; }
            .stats-inner { grid-template-columns: 1fr 1fr; }
            .pillars-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .quote-section { padding: 48px 20px; }
            .quote-section blockquote { font-size: 17px; }
        }

        @media (max-width: 480px) {
            .pillars-grid { grid-template-columns: 1fr; }
            .pillars-header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .stats-inner { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- CONTENT -->
<main style="min-height: 60vh;"></main>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script src="nav.js"></script>
<script>
var obs=new IntersectionObserver(function(e){e.forEach(function(en){if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.fade-in').forEach(function(el){obs.observe(el)});
</script>
<script src="footer.js"></script>
</body>
</html>
