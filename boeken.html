<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boeken — Dokter Richard</title>
    <meta name="description" content="Bezield Leven op Doktersrecept — het boek van Richard Hoofs over holistische gezondheid en de vier pijlers van een bezield leven.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== FONTS ===== */
        @font-face {
            font-family: 'Bosten';
            src: url('fonts/Bosten.woff2') format('woff2'),
                 url('fonts/Bosten.woff') format('woff'),
                 url('fonts/Bosten.otf') format('opentype');
            font-display: swap;
        }

        /* ===== RESET ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FFFAF8;
            --bg-alt: #f7f0eb;
            --green: #63746B;
            --green-dark: #3a3d32;
            --accent: #C1774F;
            --sage: #a0a496;
            --cream: #fffcf8;
            --white: #ffffff;
            --text: #2a2d24;
            --text-body: #3a3d32;
            --text-muted: #a0a496;
            --border: rgba(136, 140, 121, 0.15);
            --border-strong: rgba(136, 140, 121, 0.3);
            --font-heading: 'Montserrat', -apple-system, sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 999px;
            --max-width: 1200px;
            --section-padding: 100px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 16px;
            background: var(--bg);
            color: var(--text-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            line-height: 1.65;
        }

        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        /* ===== SEED OF LIFE DECORATIVE BACKGROUND ===== */
        .has-seed-bg {
            position: relative;
            overflow: hidden;
        }
        .seed-bg {
            position: absolute;
            pointer-events: none;
            opacity: 0.07;
            z-index: 0;
        }
        .seed-bg circle {
            fill: none;
            stroke: #fff;
            stroke-width: 0.5;
        }
        .seed-bg-right {
            width: 380px; height: 380px;
            top: -60px; right: -80px;
        }
        .seed-bg-left {
            width: 300px; height: 300px;
            bottom: -50px; left: -60px;
        }
        .seed-bg-center {
            width: 500px; height: 500px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .has-seed-bg > *:not(.seed-bg) {
            position: relative;
            z-index: 1;
        }

        /* ===== NAVIGATION ===== */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 48px;
            background: rgba(255, 250, 248, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Bosten', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--green);
            letter-spacing: 0.02em;
            text-transform: uppercase;
            position: absolute;
            left: 48px;
        }
        .nav-logo .seed-of-life {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        .nav-logo .seed-of-life circle {
            fill: none;
            stroke: var(--green);
            stroke-width: 0.8;
        }
        .nav-center {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--bg-alt);
            border-radius: var(--radius-full);
            padding: 4px;
        }
        .nav-center a {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: var(--radius-full);
            transition: all 0.2s;
        }
        .nav-center a:hover { color: var(--green-dark); }
        .nav-center a.active {
            background: var(--white);
            color: var(--green-dark);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            font-weight: 600;
        }
        .nav-cta {
            position: absolute;
            right: 48px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px 9px 18px;
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            transition: all 0.25s;
            overflow: hidden;
        }
        .nav-cta:hover { background: var(--green-dark); }
        .nav-cta .btn-arrow {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            flex-shrink: 0;
        }
        .nav-cta:hover .btn-arrow { transform: translateX(3px); background: rgba(255,255,255,0.3); }
        .nav-cta .btn-arrow svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
        .hamburger svg { width: 26px; height: 26px; stroke: var(--green-dark); stroke-width: 2; fill: none; }

        /* ===== BUTTONS (Slide effect with arrow) ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 22px;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            transition: color 0.3s, border-color 0.3s;
            z-index: 1;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scaleX(1);
            transform-origin: right;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scaleX(0);
            transform-origin: left;
        }
        .btn:hover::before {
            transform: scaleX(0);
            transform-origin: left;
        }
        .btn:hover::after {
            transform: scaleX(1);
            transform-origin: right;
        }
        .btn .btn-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            flex-shrink: 0;
        }
        .btn:hover .btn-arrow {
            transform: translateX(3px);
            background: rgba(255,255,255,0.3);
        }
        .btn .btn-arrow svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* Accent button */
        .btn-accent { background: transparent; color: #fff; }
        .btn-accent::before { background: var(--accent); }
        .btn-accent::after { background: var(--green-dark); }

        /* Dark button */
        .btn-dark { background: transparent; color: #fff; }
        .btn-dark::before { background: var(--green-dark); }
        .btn-dark::after { background: var(--accent); }

        /* White button */
        .btn-white { background: transparent; color: var(--green-dark); }
        .btn-white::before { background: #fff; }
        .btn-white::after { background: var(--bg-alt); }

        /* Outline */
        .btn-outline { background: transparent; color: var(--green-dark); border: 1.5px solid var(--border-strong); }
        .btn-outline::before { background: transparent; }
        .btn-outline::after { background: var(--accent); }
        .btn-outline:hover { color: #fff; border-color: var(--accent); }

        /* Outline white */
        .btn-outline-white { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.25); }
        .btn-outline-white::before { background: transparent; }
        .btn-outline-white::after { background: rgba(255,255,255,0.12); }
        .btn-outline-white:hover { border-color: #fff; }

        /* Ghost */
        .btn-ghost { background: none; color: var(--accent); padding: 12px 0; font-weight: 600; font-size: 13px; overflow: visible; }
        .btn-ghost::before, .btn-ghost::after { display: none; }
        .btn-ghost:hover { color: var(--green-dark); }
        .btn-ghost .btn-arrow { background: rgba(193,119,79,0.1); }
        .btn-ghost:hover .btn-arrow { background: rgba(58,61,50,0.1); }

        /* ===== LABEL ===== */
        .label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }
        .label-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* ===== PAGE HERO ===== */
        .page-hero {
            background: var(--bg-alt);
            padding: 80px 48px 60px;
            text-align: center;
        }
        .page-hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(30px, 3.5vw, 46px);
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.15;
            letter-spacing: -0.025em;
            margin-bottom: 16px;
        }
        .page-hero p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== BOOK SECTION ===== */
        .book-section {
            padding: var(--section-padding) 48px;
        }
        .book-grid {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 56px;
            align-items: center;
        }
        .book-image { text-align: center; }
        .book-image img {
            max-width: 400px;
            border-radius: var(--radius-lg);
            box-shadow: 0 16px 40px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        .book-content h2 {
            font-family: var(--font-heading);
            font-size: clamp(26px, 3vw, 36px);
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.15;
            letter-spacing: -0.025em;
            margin-bottom: 16px;
        }
        .book-content p {
            font-size: 15px;
            color: var(--text-body);
            line-height: 1.75;
            margin-bottom: 12px;
        }
        .book-content p:last-of-type { margin-bottom: 24px; }

        /* ===== WHAT YOU'LL LEARN (green bg) ===== */
        .learn-section {
            padding: var(--section-padding) 48px;
            background: var(--green);
        }
        .learn-container {
            max-width: var(--max-width);
            margin: 0 auto;
        }
        .learn-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .learn-header h2 {
            font-family: var(--font-heading);
            font-size: clamp(26px, 3vw, 36px);
            font-weight: 700;
            color: #fff;
            line-height: 1.15;
            letter-spacing: -0.025em;
            margin-bottom: 10px;
        }
        .learn-header p {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
        }
        .learn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .learn-card {
            padding: 28px 24px;
            background: rgba(255,255,255,0.08);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.25s;
        }
        .learn-card:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-3px);
        }
        .learn-card-icon {
            width: 44px; height: 44px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .learn-card-icon svg {
            width: 22px; height: 22px;
            stroke: rgba(255,255,255,0.8);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .learn-card h3 {
            font-family: var(--font-heading);
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .learn-card p {
            font-size: 13px;
            color: rgba(255,255,255,0.55);
            line-height: 1.6;
        }

        /* ===== REVIEWS SECTION ===== */
        .reviews-section {
            padding: var(--section-padding) 48px;
            background: var(--bg);
        }
        .reviews-container {
            max-width: var(--max-width);
            margin: 0 auto;
        }
        .reviews-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .reviews-header h2 {
            font-family: var(--font-heading);
            font-size: clamp(26px, 3vw, 36px);
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.15;
            letter-spacing: -0.025em;
        }
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .review-card {
            padding: 28px 24px;
            background: var(--cream);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            transition: all 0.25s;
        }
        .review-card:hover {
            box-shadow: 0 8px 28px rgba(0,0,0,0.06);
            transform: translateY(-3px);
        }
        .review-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 14px;
        }
        .review-stars svg {
            width: 16px; height: 16px;
            fill: var(--accent);
            stroke: none;
        }
        .review-card blockquote {
            font-size: 14px;
            color: var(--text-body);
            line-height: 1.75;
            font-style: italic;
            margin-bottom: 16px;
        }
        .review-card .review-author {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        /* ===== UNIFIED FOOTER ===== */
        .unified-footer {
            background: var(--green);
            padding: 72px 48px 24px;
            position: relative;
            overflow: hidden;
        }
        .footer-newsletter {
            max-width: var(--max-width);
            margin: 0 auto 56px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
            padding-bottom: 48px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .footer-newsletter-text h2 {
            font-family: var(--font-heading);
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .footer-newsletter-text p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.65;
        }
        .newsletter-form {
            display: flex;
            gap: 8px;
        }
        .newsletter-form input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 13px;
            font-family: var(--font-body);
            outline: none;
        }
        .newsletter-form input::placeholder { color: rgba(255,255,255,0.35); }
        .newsletter-form input:focus { border-color: rgba(255,255,255,0.4); }
        .newsletter-form button {
            padding: 12px 24px;
            background: #fff;
            color: var(--green-dark);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
        }
        .newsletter-form button:hover { background: var(--bg); }
        .footer-grid {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        .footer-brand .footer-logo {
            font-family: 'Bosten', Georgia, serif;
            font-size: 20px;
            font-weight: 400;
            color: #fff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .footer-brand p {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            line-height: 1.65;
            max-width: 260px;
        }
        .footer-social {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .footer-social a {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .footer-social a:hover { background: var(--accent); }
        .footer-social a svg {
            width: 14px; height: 14px;
            fill: rgba(255,255,255,0.5);
            transition: fill 0.2s;
        }
        .footer-social a:hover svg { fill: #fff; }
        .footer-col h4 {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.35);
            margin-bottom: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .footer-col ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .footer-col a {
            font-size: 13px;
            color: rgba(255,255,255,0.55);
            transition: color 0.2s;
        }
        .footer-col a:hover { color: #fff; }
        .footer-col span {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
        }
        .footer-bottom {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .footer-bottom p {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
        .footer-seed-watermark {
            position: absolute;
            right: -80px;
            bottom: -80px;
            width: 500px;
            height: 500px;
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 0.3;
            pointer-events: none;
        }
        .footer-bottom a {
            color: rgba(255,255,255,0.5);
            text-decoration: underline;
        }
        .footer-bottom a:hover {
            color: #fff;
        }

        /* ===== ANIMATIONS ===== */
        .fade-in {
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .fade-in-d1 { transition-delay: 0.06s; }
        .fade-in-d2 { transition-delay: 0.12s; }
        .fade-in-d3 { transition-delay: 0.18s; }

        /* ===== MOBILE NAV ===== */
        .mobile-nav {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .mobile-nav.open { display: flex; }
        .mobile-nav a {
            font-family: var(--font-heading);
            font-size: 22px;
            font-weight: 700;
            color: var(--green-dark);
            letter-spacing: -0.02em;
        }
        .mobile-nav a:hover { color: var(--accent); }
        .mobile-nav-close {
            position: absolute;
            top: 16px; right: 20px;
            background: none; border: none; cursor: pointer;
        }
        .mobile-nav-close svg {
            width: 28px; height: 28px;
            stroke: var(--green-dark); stroke-width: 2; fill: none;
        }
        .mobile-nav-cta {
            margin-top: 12px;
            padding: 12px 28px;
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .nav { padding: 12px 32px; }
            .nav-center { display: none; }
            .nav-cta { display: none; }
            .nav-logo { position: static; }
            .hamburger { display: block; position: absolute; right: 32px; }

            .page-hero { padding: 60px 32px 48px; }
            .book-section { padding: 80px 32px; }
            .book-grid { grid-template-columns: 1fr; gap: 32px; }
            .learn-section { padding: 80px 32px; }
            .learn-grid { grid-template-columns: repeat(2, 1fr); }
            .reviews-section { padding: 80px 32px; }
            .reviews-grid { grid-template-columns: repeat(2, 1fr); }
            .footer-newsletter { grid-template-columns: 1fr; gap: 24px; }
            .footer-grid { grid-template-columns: 1fr; gap: 28px; }
        }

        @media (max-width: 768px) {
            :root { --section-padding: 56px; }

            .nav { padding: 10px 20px; }
            .nav-logo { font-size: 16px; }
            .hamburger { right: 20px; }
