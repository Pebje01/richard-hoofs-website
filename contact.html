<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Dokter Richard</title>
    <meta name="description" content="Neem contact op met Dokter Richard Hoofs — huisarts, leefstijlcoach en auteur. Medische Praktijk Mondesir, Den Bosch.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        /* ===== CONTACT SECTION ===== */
        .contact-section {
            padding: var(--section-padding) 48px;
            max-width: calc(var(--max-width) + 96px);
            margin: 0 auto;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 56px;
            align-items: start;
        }
        .contact-info h3 {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 24px;
        }
        .contact-info-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 20px;
        }
        .contact-info-icon {
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            background: rgba(193, 119, 79, 0.1);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .contact-info-icon svg {
            width: 20px; height: 20px;
            stroke: var(--accent); fill: none;
            stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
        }
        .contact-info-item h4 {
            font-family: var(--font-heading);
            font-size: 14px; font-weight: 700;
            color: var(--green-dark); margin-bottom: 2px;
        }
        .contact-info-item p {
            font-size: 13px; color: var(--text-muted); line-height: 1.5;
        }

        /* ===== CONSULT FORM ===== */
        .consult-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group label {
            display: block;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            color: var(--green-dark);
            margin-bottom: 6px;
        }
        .form-group label span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .form-group textarea,
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--cream);
            font-size: 14px;
            font-family: var(--font-body);
            color: var(--text-body);
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
        }
        .form-group textarea:focus,
        .form-group input:focus,
        .form-group select:focus { border-color: var(--green); }
        .form-group textarea { min-height: 120px; }
        .consult-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .consult-submit:hover { background: #a8623d; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .contact-section { padding: 80px 32px; }
            .contact-grid { grid-template-columns: 1fr; gap: 40px; }
        }

        @media (max-width: 768px) {
            .contact-section { padding-left: 20px; padding-right: 20px; }
            .contact-grid { grid-template-columns: 1fr; gap: 32px; }
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- PAGE HERO -->
<section class="page-hero">
    <h1 class="fade-in">Neem contact op</h1>
    <p class="fade-in fade-in-d1">Heb je een vraag of wil je meer weten over coaching, leefstijlgeneeskunde of andere diensten? Neem gerust contact op.</p>
</section>

<!-- CONTACT -->
<section class="contact-section">
    <div class="contact-grid">
        <!-- LEFT: Contact Info -->
        <div class="contact-info fade-in">
            <h3>Contactgegevens</h3>

            <div class="contact-info-item">
                <div class="contact-info-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                    <h4>E-mail</h4>
                    <p><a href="mailto:info@dokterrichard.nl" style="color: var(--accent);">info@dokterrichard.nl</a></p>
                </div>
            </div>

            <div class="contact-info-item">
                <div class="contact-info-icon">
                    <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                    <h4>Locatie</h4>
                    <p>Den Bosch, Nederland</p>
                </div>
            </div>

            <div class="contact-info-item">
                <div class="contact-info-icon">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
                <div>
                    <h4>Praktijk</h4>
                    <p>Medische Praktijk Mondesir</p>
                </div>
            </div>
        </div>

        <!-- RIGHT: Contact Form -->
        <div class="fade-in fade-in-d1">
            <form class="consult-form" id="contactForm" method="POST">
                <input type="hidden" name="access_key" value="4ba3a29f-d163-4a82-aed2-3ead1397f7e0">

                <div class="form-group">
                    <label for="name">Naam <span>(verplicht)</span></label>
                    <input type="text" id="name" name="name" placeholder="Je volledige naam" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mailadres <span>(verplicht)</span></label>
                    <input type="email" id="email" name="email" placeholder="Je e-mailadres" required>
                </div>

                <div class="form-group">
                    <label for="phone">Telefoonnummer</label>
                    <input type="tel" id="phone" name="phone" placeholder="Je telefoonnummer">
                </div>

                <div class="form-group">
                    <label for="subject">Onderwerp <span>(verplicht)</span></label>
                    <input type="text" id="subject" name="subject" placeholder="Waar gaat je bericht over?" required>
                </div>

                <div class="form-group">
                    <label for="message">Bericht <span>(verplicht)</span></label>
                    <textarea id="message" name="message" placeholder="Schrijf hier je bericht..." required></textarea>
                </div>

                <button type="submit" class="consult-submit">Verstuur bericht</button>
                <div id="form-status" style="margin-top:16px;padding:14px 20px;border-radius:8px;font-size:14px;display:none;"></div>
            </form>
        </div>
    </div>
</section>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script src="nav.js"></script>
<script>
var obs=new IntersectionObserver(function(e){e.forEach(function(en){if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.fade-in').forEach(function(el){obs.observe(el)});

// Web3Forms AJAX submit
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = e.target;
    var btn = form.querySelector('.consult-submit');
    var status = document.getElementById('form-status');
    btn.disabled = true;
    btn.textContent = 'Versturen...';
    status.style.display = 'none';

    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: new FormData(form)
    }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.success) {
            status.style.display = 'block';
            status.style.background = '#e8f5e9';
            status.style.color = '#2e7d32';
            status.textContent = 'Bedankt! Je bericht is succesvol verstuurd. We nemen zo snel mogelijk contact met je op.';
            form.reset();
        } else {
            status.style.display = 'block';
            status.style.background = '#fce4ec';
            status.style.color = '#c62828';
            status.textContent = 'Er ging iets mis. Probeer het opnieuw of mail ons direct.';
        }
        btn.disabled = false;
        btn.textContent = 'Verstuur bericht';
    }).catch(function() {
        status.style.display = 'block';
        status.style.background = '#fce4ec';
        status.style.color = '#c62828';
        status.textContent = 'Er ging iets mis. Probeer het opnieuw of mail ons direct.';
        btn.disabled = false;
        btn.textContent = 'Verstuur bericht';
    });
});
</script>
<script src="footer.js"></script>
</body>
</html>
